<!DOCTYPE html>
<html>
<head>
    <title>System Maintenance | Session Recovery</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #terminal { width: 400px; border: 1px solid #333; padding: 40px; cursor: pointer; background: #1c1c1c; border-radius: 8px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #3498db; border: none; color: white; padding: 12px 28px; margin-top: 25px; display: inline-block; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 5px; }
        .status { color: #888; font-size: 13px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="terminal" onclick="launchRick()">
        <div class="status">
            [STATUS] Secure Link: <span style="color: #2ecc71;">ESTABLISHED</span><br><br>
            <span style="color: #e74c3c; font-weight: bold;">SESSION EXPIRED</span><br>
            Your authentication token has timed out. 
        </div>
        <div class="btn">RE-AUTHENTICATE & CONTINUE</div>
    </div>

    <video id="rick" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; object-fit: cover;">
        <source src="https://raw.githubusercontent.com/username/repo/main/xvFZjo5PgG0.mp4" type="video/mp4">
    </video>

    <script>
        function launchRick() {
            var v = document.getElementById('rick');
            var t = document.getElementById('terminal');
            
            // Hide the terminal and show the video
            t.style.display = 'none';
            v.style.display = 'block';
            
            // Play the video with sound (unlocked by the click)
            v.play();
        }
    </script>
</body>
</html>
